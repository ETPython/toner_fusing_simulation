<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電子写真 定着シミュレーター</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --surface: #16181c;
  --surface2: #1e2126;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --text2: #8a8f9e;
  --text3: #545868;
  --accent: #ff5c35;
  --accent2: #ff8f6b;
  --blue: #4d9fff;
  --green: #29c98f;
  --amber: #f0a820;
  --purple: #a07df8;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

.header {
  padding: 24px 32px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 16px;
}

.header h1 {
  font-size: 15px;
  font-weight: 400;
  color: var(--text2);
  font-family: var(--mono);
  letter-spacing: 0.04em;
}

.header .tag {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: rgba(255,92,53,0.1);
  border: 1px solid rgba(255,92,53,0.25);
  padding: 2px 8px;
  border-radius: 3px;
}

.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: calc(100vh - 61px);
}

.sidebar {
  border-right: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.canvas-wrap {
  flex: 1;
  position: relative;
  background: var(--surface);
  overflow: hidden;
}

canvas#c {
  display: block;
  width: 100%;
  height: 100%;
}

.metrics-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--border);
}

.metric-cell {
  padding: 14px 20px;
  border-right: 1px solid var(--border);
}

.metric-cell:last-child { border-right: none; }

.metric-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.metric-value {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.metric-unit {
  font-size: 11px;
  color: var(--text3);
  margin-top: 3px;
  font-family: var(--mono);
}

.section-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.ctrl {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}

.ctrl:last-child { margin-bottom: 0; }

.ctrl-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.ctrl-name {
  font-size: 11px;
  color: var(--text2);
}

.ctrl-val {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent2);
  font-weight: 500;
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 2px;
  background: var(--border2);
  border-radius: 2px;
  outline: none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  transition: transform 0.15s;
}

input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.3);
}

select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 11px;
  font-family: var(--mono);
  padding: 6px 8px;
  border-radius: 4px;
  outline: none;
  cursor: pointer;
}

select:focus { border-color: var(--accent); }

.btn-run {
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}

.btn-run:hover { opacity: 0.85; }
.btn-run:active { transform: scale(0.98); }

.btn-reset {
  width: 100%;
  padding: 8px;
  background: transparent;
  color: var(--text3);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

.btn-reset:hover { border-color: var(--border2); color: var(--text2); }

.status-pill {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  font-weight: 500;
  letter-spacing: 0.04em;
  display: inline-block;
  margin-top: 8px;
}

.status-ok { background: rgba(41,201,143,0.12); color: var(--green); border: 1px solid rgba(41,201,143,0.25); }
.status-warn { background: rgba(240,168,32,0.12); color: var(--amber); border: 1px solid rgba(240,168,32,0.25); }
.status-danger { background: rgba(255,92,53,0.12); color: var(--accent); border: 1px solid rgba(255,92,53,0.25); }

.legend {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.leg-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text3);
}

.leg-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.progress-wrap {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
}

.progress-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
  text-align: center;
}

.progress-track {
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 0.05s linear;
}
</style>
</head>
<body>

<div class="header">
  <h1>ELECTROPHOTOGRAPHY / FUSING PROCESS SIMULATOR</h1>
  <span class="tag">v1.0</span>
</div>

<div class="layout">
  <div class="sidebar">
    <div>
      <div class="section-label">制御パラメータ</div>
      <div class="ctrl">
        <div class="ctrl-header"><span class="ctrl-name">定着温度</span><span class="ctrl-val" id="vTemp">180°C</span></div>
        <input type="range" id="sTemp" min="130" max="230" step="1" value="180">
      </div>
      <div class="ctrl">
        <div class="ctrl-header"><span class="ctrl-name">ニップ圧力</span><span class="ctrl-val" id="vPres">0.20 MPa</span></div>
        <input type="range" id="sPres" min="0.05" max="0.40" step="0.01" value="0.20">
      </div>
      <div class="ctrl">
        <div class="ctrl-header"><span class="ctrl-name">プロセス速度</span><span class="ctrl-val" id="vSpeed">200 mm/s</span></div>
        <input type="range" id="sSpeed" min="50" max="500" step="10" value="200">
      </div>
      <div class="ctrl">
        <div class="ctrl-header"><span class="ctrl-name">トナー粒子径</span><span class="ctrl-val" id="vDiam">6.0 µm</span></div>
        <input type="range" id="sDiam" min="3.0" max="9.0" step="0.5" value="6.0">
      </div>
      <div class="ctrl">
        <div class="ctrl-header"><span class="ctrl-name">Gʹ低下開始温度</span><span class="ctrl-val" id="vVisc">65°C</span></div>
        <input type="range" id="sVisc" min="40" max="100" step="1" value="65">
      </div>
      <div class="ctrl">
        <div class="ctrl-header"><span class="ctrl-name">ワックス添加量</span><span class="ctrl-val" id="vWax">4.0%</span></div>
        <input type="range" id="sWax" min="0" max="10" step="0.5" value="4.0">
      </div>
    </div>

    <div>
      <div class="section-label">材料条件</div>
      <div class="ctrl">
        <span class="ctrl-name" style="margin-bottom:6px;display:block">フィルム体積抵抗率</span>
        <select id="sRes">
          <option value="1">低 — 10⁸ Ω·cm</option>
          <option value="2" selected>中 — 10¹⁰ Ω·cm</option>
          <option value="3">高 — 10¹² Ω·cm</option>
        </select>
      </div>
      <div class="ctrl">
        <span class="ctrl-name" style="margin-bottom:6px;display:block">紙の表面粗さ</span>
        <select id="sRough">
          <option value="1">小 — 平滑紙</option>
          <option value="2" selected>中 — 普通紙</option>
          <option value="3">大 — 粗面紙</option>
        </select>
      </div>
    </div>

    <div>
      <div class="section-label">判定</div>
      <div id="statusPill" class="status-pill status-ok">◉ 正常定着</div>
    </div>

    <div style="margin-top:auto">
      <div class="section-label">凡例</div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:#ff5c35"></div>トナー粒子</div>
        <div class="leg-item"><div class="leg-dot" style="background:#29c98f"></div>ワックス染み出し</div>
        <div class="leg-item"><div class="leg-dot" style="background:#4d9fff"></div>定着フィルム</div>
        <div class="leg-item"><div class="leg-dot" style="background:#a07df8"></div>加圧ローラ</div>
        <div class="leg-item"><div class="leg-dot" style="background:#545868"></div>用紙</div>
        <div class="leg-item"><div class="leg-dot" style="background:#f0a820"></div>電荷蓄積（オフセット）</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn-run" id="btnRun">▶ シミュレーション実行</button>
      <button class="btn-reset" id="btnReset">リセット</button>
    </div>
  </div>

  <div class="main">
    <div class="canvas-wrap">
      <canvas id="c"></canvas>
      <div class="progress-wrap">
        <div class="progress-label">定着プロセス進行</div>
        <div class="progress-track">
          <div class="progress-fill" id="progFill"></div>
        </div>
      </div>
    </div>
    <div class="metrics-bar">
      <div class="metric-cell">
        <div class="metric-label">トナー面積率</div>
        <div class="metric-value" id="mCov">—</div>
        <div class="metric-unit">% 紙面被覆</div>
      </div>
      <div class="metric-cell">
        <div class="metric-label">剥離エネルギー</div>
        <div class="metric-value" id="mPeel">—</div>
        <div class="metric-unit">N/m (畑の式)</div>
      </div>
      <div class="metric-cell">
        <div class="metric-label">ニップ時間</div>
        <div class="metric-value" id="mNip">—</div>
        <div class="metric-unit">ms</div>
      </div>
      <div class="metric-cell">
        <div class="metric-label">定着強度指標</div>
        <div class="metric-value" id="mFix">—</div>
        <div class="metric-unit">%</div>
      </div>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H, animId = null, animT = 0, running = false;

function resize() {
  const wrap = cv.parentElement;
  const rect = wrap.getBoundingClientRect();
  const dpr = devicePixelRatio || 1;
  W = rect.width; H = rect.height;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

const sliders = [
  ['sTemp','vTemp', v => v + '°C'],
  ['sPres','vPres', v => parseFloat(v).toFixed(2) + ' MPa'],
  ['sSpeed','vSpeed', v => v + ' mm/s'],
  ['sDiam','vDiam', v => parseFloat(v).toFixed(1) + ' µm'],
  ['sVisc','vVisc', v => v + '°C'],
  ['sWax','vWax', v => parseFloat(v).toFixed(1) + '%'],
];

sliders.forEach(([sid, vid, fmt]) => {
  const s = document.getElementById(sid);
  const vEl = document.getElementById(vid);
  s.addEventListener('input', () => {
    vEl.textContent = fmt(s.value);
    if (!running) draw(animT);
    updateMetrics();
  });
});

['sRes','sRough'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    if (!running) draw(animT);
    updateMetrics();
  });
});

function getParams() {
  return {
    T: +document.getElementById('sTemp').value,
    P: +document.getElementById('sPres').value,
    spd: +document.getElementById('sSpeed').value,
    d: +document.getElementById('sDiam').value,
    Tvis: +document.getElementById('sVisc').value,
    wax: +document.getElementById('sWax').value,
    res: +document.getElementById('sRes').value,
    rough: +document.getElementById('sRough').value,
  };
}

function calcPhysics(p, t) {
  const nipTime = (8 / p.spd) * 1000;
  const dT = Math.max(0, p.T - p.Tvis);
  const meltRatio = Math.min(1, (dT / 80) * Math.pow(p.P / 0.20, 0.4) * (1 + t * 0.8));
  const roughFactor = [1, 1, 1.25, 1.6][p.rough];
  const diamEffect = 6 / p.d;
  const pressEffect = Math.pow(p.P / 0.20, 0.35);
  const coverage = Math.min(95, 30 + meltRatio * 35 * pressEffect * diamEffect / roughFactor + p.wax * 1.5);
  const Eadh = (0.15 + meltRatio * 0.6 + p.wax * 0.08) * roughFactor;
  const Y = 1.82e9, thick = 96e-6, R = 8.13e-3;
  const Ebend = 0.5 * (Y * Math.pow(thick, 3) / 12) * Math.pow(1 / R, 2);
  const resFactor = [1, 1.3, 1.8, 3.2][p.res];
  const offsetRisk = (Eadh * resFactor * 1.1) / Ebend;
  const fixStrength = Math.min(100, coverage * 0.8 + meltRatio * 20);
  return { meltRatio, coverage, Eadh, Ebend, nipTime, offsetRisk, fixStrength };
}

function updateMetrics() {
  const p = getParams();
  const ph = calcPhysics(p, Math.max(animT, 0.01));
  document.getElementById('mCov').textContent = ph.coverage.toFixed(1) + '%';
  document.getElementById('mPeel').textContent = ph.Eadh.toFixed(2);
  document.getElementById('mNip').textContent = ph.nipTime.toFixed(1);
  document.getElementById('mFix').textContent = Math.round(ph.fixStrength) + '%';

  const sp = document.getElementById('statusPill');
  if (ph.offsetRisk > 1.5) {
    sp.textContent = '⚠ 静電オフセットリスク';
    sp.className = 'status-pill status-danger';
  } else if (ph.Eadh > ph.Ebend * 0.85) {
    sp.textContent = '⚠ 巻き付きリスク注意';
    sp.className = 'status-pill status-warn';
  } else {
    sp.textContent = '◉ 正常定着';
    sp.className = 'status-pill status-ok';
  }
}

function lerp(a, b, t) { return a + (b - a) * t; }

function draw(t) {
  if (!W || !H) return;
  ctx.clearRect(0, 0, W, H);

  const p = getParams();
  const ph = calcPhysics(p, t);
  const mr = ph.meltRatio;

  // ── Layout constants ──────────────────────────────────────────
  // Nip zone occupies the horizontal center band
  const nipCX   = W / 2;
  const nipHalfW = Math.min(W * 0.32, 260);
  const nipX1   = nipCX - nipHalfW;
  const nipX2   = nipCX + nipHalfW;
  const nipW    = nipX2 - nipX1;

  // Vertical: divide canvas into 5 bands
  //  [0..heatRollerMid] [heatRollerMid..filmTop] [filmTop..filmBot] [filmBot..paperTop] [paperTop..paperBot] [paperBot..pressRollerMid]
  const filmH   = 16;   // thin film strip
  const paperH  = 18;   // paper strip
  const gap     = 48;   // gap between film bottom and paper top — toner lives here

  const midY    = H / 2;                      // center of toner gap
  const filmBot = midY - gap / 2;             // bottom edge of film
  const filmTop = filmBot - filmH;
  const paperTop = midY + gap / 2;            // top edge of paper
  const paperBot = paperTop + paperH;

  const hRollerRY = Math.min(H * 0.18, 90);  // heat roller vertical radius
  const hRollerRX = hRollerRY * 1.55;
  const hRollerCY = filmTop - hRollerRY * 0.15; // roller tangent to film top

  const pRollerRY = Math.min(H * 0.18, 90);
  const pRollerRX = pRollerRY * 1.55;
  const pRollerCY = paperBot + pRollerRY * 0.15;

  // ── Grid background ───────────────────────────────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.022)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // ── Heat roller ───────────────────────────────────────────────
  const hrGrad = ctx.createRadialGradient(nipCX - hRollerRX*0.3, hRollerCY - hRollerRY*0.4, hRollerRY*0.1, nipCX, hRollerCY, hRollerRX);
  hrGrad.addColorStop(0, '#2e2218');
  hrGrad.addColorStop(1, '#0f0d0c');
  ctx.beginPath();
  ctx.ellipse(nipCX, hRollerCY, hRollerRX, hRollerRY, 0, 0, Math.PI*2);
  ctx.fillStyle = hrGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(77,159,255,0.25)'; ctx.lineWidth = 1; ctx.stroke();

  // heat glow on bottom of roller
  const heatFrac = Math.min(1, (p.T - 130) / 100);
  const glowAlpha = 0.08 + heatFrac * 0.18;
  const hGlow = ctx.createLinearGradient(0, hRollerCY, 0, filmTop);
  hGlow.addColorStop(0, `rgba(255,${Math.round(140 - heatFrac*80)},40,0)`);
  hGlow.addColorStop(1, `rgba(255,${Math.round(140 - heatFrac*80)},40,${glowAlpha})`);
  ctx.fillStyle = hGlow;
  ctx.fillRect(nipX1 - 20, hRollerCY, nipW + 40, filmTop - hRollerCY);

  ctx.fillStyle = 'rgba(77,159,255,0.45)';
  ctx.font = '500 10px DM Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HEAT ROLLER', nipCX, hRollerCY - hRollerRY + 14);

  // ── Fusing film ───────────────────────────────────────────────
  const filmGrad = ctx.createLinearGradient(0, filmTop, 0, filmBot);
  filmGrad.addColorStop(0, 'rgba(77,159,255,0.4)');
  filmGrad.addColorStop(1, 'rgba(77,159,255,0.15)');
  ctx.fillStyle = filmGrad;
  ctx.beginPath(); ctx.roundRect(nipX1 - 20, filmTop, nipW + 40, filmH, 2); ctx.fill();
  ctx.strokeStyle = 'rgba(77,159,255,0.55)'; ctx.lineWidth = 0.5; ctx.stroke();

  // film label (left side, outside nip)
  ctx.fillStyle = 'rgba(77,159,255,0.5)';
  ctx.font = '9px DM Mono, monospace';
  ctx.textAlign = 'right';
  ctx.fillText('FILM', nipX1 - 26, filmTop + filmH/2 + 3);

  // charge accumulation
  if (p.res === 3 && t > 0.2) {
    const alpha = Math.min(0.7, (t - 0.2) * 2);
    ctx.fillStyle = `rgba(240,168,32,${alpha * 0.18})`;
    ctx.beginPath(); ctx.roundRect(nipX1 - 20, filmTop, nipW + 40, filmH, 2); ctx.fill();
    for (let i = 0; i < 14; i++) {
      const ex = nipX1 + 8 + i * ((nipW - 16) / 13);
      ctx.beginPath(); ctx.arc(ex, filmTop + filmH/2, 2, 0, Math.PI*2);
      ctx.fillStyle = `rgba(240,168,32,${alpha * 0.85})`; ctx.fill();
    }
  }

  // ── Paper ─────────────────────────────────────────────────────
  const roughH = [0, 0, 2, 5][p.rough];
  // roughness bumps on top surface of paper
  if (roughH > 0) {
    ctx.fillStyle = 'rgba(84,88,104,0.55)';
    for (let x = nipX1 - 12; x < nipX2 + 12; x += 9) {
      const rh = roughH * (0.4 + 0.6 * Math.abs(Math.sin(x * 0.42)));
      ctx.fillRect(x, paperTop - rh, 4, rh);
    }
  }
  ctx.fillStyle = '#1c1e24';
  ctx.beginPath(); ctx.roundRect(nipX1 - 20, paperTop, nipW + 40, paperH, 2); ctx.fill();
  ctx.strokeStyle = 'rgba(136,135,128,0.35)'; ctx.lineWidth = 0.5; ctx.stroke();

  ctx.fillStyle = 'rgba(84,88,104,0.5)';
  ctx.font = '9px DM Mono, monospace';
  ctx.textAlign = 'right';
  ctx.fillText('PAPER', nipX1 - 26, paperTop + paperH/2 + 3);

  // ── Pressure roller ───────────────────────────────────────────
  const prGrad = ctx.createRadialGradient(nipCX - pRollerRX*0.3, pRollerCY - pRollerRY*0.3, pRollerRY*0.1, nipCX, pRollerCY, pRollerRX);
  prGrad.addColorStop(0, '#1e1b32');
  prGrad.addColorStop(1, '#0e0c1a');
  ctx.beginPath();
  ctx.ellipse(nipCX, pRollerCY, pRollerRX, pRollerRY, 0, 0, Math.PI*2);
  ctx.fillStyle = prGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(160,125,248,0.25)'; ctx.lineWidth = 1; ctx.stroke();

  ctx.fillStyle = 'rgba(160,125,248,0.45)';
  ctx.font = '500 10px DM Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PRESSURE ROLLER', nipCX, pRollerCY + pRollerRY - 12);

  // ── Toner particles (in gap between film and paper) ────────────
  const tonerZoneH = gap - 4;          // available height for toner
  const baseR = Math.min(p.d * 2.2, tonerZoneH * 0.28);  // cap radius to fit
  const margin = 16;
  const tonerW = nipW - margin * 2;
  const cols = Math.max(4, Math.floor(tonerW / (baseR * 2.6)));
  const rows = Math.max(1, Math.min(3, Math.floor(tonerZoneH / (baseR * 2.2))));
  const cellW = tonerW / cols;

  const squish = Math.min(0.85, mr * 1.05 + 0.04);
  const ry0 = baseR * (1 - squish * 0.68);   // squished vertical radius
  const rx0 = baseR * (1 + squish * 0.52);    // expanded horizontal radius

  // stack from paper top upwards
  for (let row = rows - 1; row >= 0; row--) {
    for (let col = 0; col < cols; col++) {
      const bx = nipX1 + margin + cellW * col + cellW / 2;
      // row 0 = bottom row (closest to paper), row N = top row (closest to film)
      const stackStep = ry0 * 2 * (1 - mr * 0.45);
      const ty = paperTop - ry0 - 2 - row * stackStep;

      const r1 = Math.round(200 + heatFrac * 55);
      const g1 = Math.round(70 - heatFrac * 30);
      const b1 = 40;

      const tGrad = ctx.createRadialGradient(bx - rx0 * 0.25, ty - ry0 * 0.28, 0, bx, ty, rx0);
      tGrad.addColorStop(0, `rgb(${r1+45},${g1+32},${b1+22})`);
      tGrad.addColorStop(1, `rgb(${r1},${g1},${b1})`);
      ctx.beginPath();
      ctx.ellipse(bx, ty, rx0, ry0, 0, 0, Math.PI*2);
      ctx.fillStyle = tGrad; ctx.fill();
      ctx.strokeStyle = `rgba(${r1-30},${g1},${b1},0.35)`;
      ctx.lineWidth = 0.5; ctx.stroke();

      // wax exudation from bottom row towards paper
      if (t > 0.35 && p.wax > 0 && row === 0) {
        const waxAlpha = Math.min(1, (t - 0.35) * 2.2);
        const waxCount = Math.ceil(p.wax / 3.5);
        for (let w = 0; w < waxCount; w++) {
          const wx = bx - rx0 * 0.28 + w * (rx0 * 0.38);
          const wy = ty + ry0 * 0.75 + mr * ry0 * 0.5;
          const wr = Math.min(3, mr * 3 * p.wax / 10);
          ctx.beginPath(); ctx.arc(wx, wy, wr, 0, Math.PI*2);
          ctx.fillStyle = `rgba(41,201,143,${waxAlpha * 0.85})`; ctx.fill();
        }
      }
    }
  }

  // ── Dimension annotations (nip zone) ──────────────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 4]);
  ctx.beginPath(); ctx.moveTo(nipX1, filmTop - 18); ctx.lineTo(nipX1, paperBot + 18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(nipX2, filmTop - 18); ctx.lineTo(nipX2, paperBot + 18); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.font = '9px DM Mono, monospace';
  ctx.textAlign = 'left';
  ctx.fillText('NIP IN', nipX1 + 4, filmTop - 22);
  ctx.textAlign = 'right';
  ctx.fillText('NIP OUT', nipX2 - 4, filmTop - 22);

  // gap dimension label
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  const dimX = nipX2 + 36;
  ctx.beginPath(); ctx.moveTo(dimX, filmBot); ctx.lineTo(dimX, paperTop); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(dimX - 4, filmBot); ctx.lineTo(dimX + 4, filmBot); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(dimX - 4, paperTop); ctx.lineTo(dimX + 4, paperTop); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '9px DM Mono, monospace';
  ctx.textAlign = 'left';
  ctx.fillText('トナー層', dimX + 8, midY + 3);

  // ── Temperature bar (right side, clearly spaced) ───────────────
  const tbX = W - 28;
  const tbY1 = H * 0.12;
  const tbY2 = H * 0.88;
  const tbH = tbY2 - tbY1;
  const tempFrac = (p.T - 130) / 100;
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.beginPath(); ctx.roundRect(tbX, tbY1, 5, tbH, 2); ctx.fill();
  const tBarGrad = ctx.createLinearGradient(0, tbY1, 0, tbY2);
  tBarGrad.addColorStop(0, '#ff5c35');
  tBarGrad.addColorStop(0.5, '#f0a820');
  tBarGrad.addColorStop(1, '#4d9fff');
  const fillH2 = tbH * tempFrac;
  ctx.fillStyle = tBarGrad;
  ctx.beginPath(); ctx.roundRect(tbX, tbY2 - fillH2, 5, fillH2, 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,92,53,0.55)';
  ctx.font = '9px DM Mono, monospace';
  ctx.textAlign = 'center';
  ctx.save();
  ctx.translate(tbX + 2, tbY1 + tbH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('TEMP', 0, 0);
  ctx.restore();
  ctx.fillStyle = `rgba(255,${Math.round(140 - heatFrac*80)},40,0.7)`;
  ctx.font = '500 9px DM Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(p.T + '°C', tbX + 2, tbY2 - fillH2 - 5);

  // ── Warning labels ─────────────────────────────────────────────
  if (ph.Eadh > ph.Ebend * 0.75 && t > 0.3) {
    const wAlpha = Math.min(1, (t - 0.3) * 3);
    ctx.fillStyle = `rgba(240,168,32,${wAlpha})`;
    ctx.font = '500 11px DM Mono, monospace';
    ctx.textAlign = 'left';
    ctx.fillText('⚠ WRAP RISK', nipX2 + 50, paperTop + paperH/2 + 4);
  }
  if (ph.offsetRisk > 1.5 && t > 0.4) {
    const oAlpha = Math.min(1, (t - 0.4) * 2.5);
    ctx.fillStyle = `rgba(255,92,53,${oAlpha})`;
    ctx.font = '500 11px DM Mono, monospace';
    ctx.textAlign = 'left';
    ctx.fillText('⚠ OFFSET', nipX2 + 50, filmTop + filmH/2 + 4);
  }

  // ── Progress bar ──────────────────────────────────────────────
  const pf = document.getElementById('progFill');
  pf.style.width = (t * 100).toFixed(1) + '%';
  const col = ph.offsetRisk > 1.5 ? '#ff5c35' : ph.Eadh > ph.Ebend * 0.85 ? '#f0a820' : '#29c98f';
  pf.style.background = col;
}

function animate() {
  if (!running) return;
  animT = Math.min(1, animT + 0.01);
  draw(animT);
  updateMetrics();
  if (animT < 1) {
    animId = requestAnimationFrame(animate);
  } else {
    running = false;
    document.getElementById('btnRun').textContent = '▶ 再実行';
  }
}

document.getElementById('btnRun').addEventListener('click', () => {
  if (animId) cancelAnimationFrame(animId);
  animT = 0; running = true;
  document.getElementById('btnRun').textContent = '実行中…';
  animate();
});

document.getElementById('btnReset').addEventListener('click', () => {
  if (animId) cancelAnimationFrame(animId);
  running = false; animT = 0;
  document.getElementById('btnRun').textContent = '▶ シミュレーション実行';
  document.getElementById('progFill').style.width = '0%';
  draw(0);
  updateMetrics();
});

window.addEventListener('resize', () => { resize(); draw(animT); });

resize();
draw(0);
updateMetrics();
</script>
</body>
</html>
